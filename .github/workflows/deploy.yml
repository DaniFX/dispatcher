name: Build and Deploy Dispatcher

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: eco-system-464513
  REGION: europe-west1
  REPO_NAME: eco-repo
  IMAGE_NAME: dispatcher

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}' # Dovrai creare questo Secret su GitHub

      - name: Setup Gcloud
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: Build and Push
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$IMAGE_NAME:$GITHUB_SHA .
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$IMAGE_NAME:$GITHUB_SHA

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy eco-dispatcher \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$IMAGE_NAME:$GITHUB_SHA \
            --region $REGION \
            --service-account sa-dispatcher@$PROJECT_ID.iam.gserviceaccount.com \
            --allow-unauthenticated